<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* === Voler.ai — STORY 1080x1920 (variante dark) === */
  :root{ --ink:#10121B; --cloud:#F4F6F8; --citron:#D7FF3B; --cool-gray:#6B7280; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1920px;}
  body{background:var(--ink); color:var(--cloud); font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; position:relative; overflow:hidden;}
  body::before{content:""; position:absolute; top:-220px; right:-220px; width:680px; height:680px; border-radius:50%;
    background:radial-gradient(circle, rgba(215,255,59,.16) 0%, rgba(215,255,59,0) 70%);}
  /* SAFE ZONE: ~270px in alto e ~300px in basso restano liberi dalla UI di IG */
  .frame{position:absolute; inset:0; padding:270px 96px 300px; display:flex; flex-direction:column;}
  .logo{height:50px; align-self:flex-start;}
  .grow{flex:1;}
  .kicker{display:inline-flex; align-self:flex-start; align-items:center; gap:14px;
    font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:26px;
    text-transform:uppercase; letter-spacing:.16em; color:var(--citron);}
  .kicker .dot{width:13px; height:13px; border-radius:50%; background:var(--citron);}
  .headline{margin-top:36px; font-family:"Space Grotesk",system-ui,sans-serif;
    font-weight:700; letter-spacing:-0.02em; line-height:1.06; font-size:104px; color:var(--cloud);}
  .headline .hl{color:var(--citron);}
  .headline .hline{display:block; white-space:nowrap;}
  .body{margin-top:40px; font-size:42px; line-height:1.4; color:#C7CCD6; font-weight:400;}
  .body strong{color:var(--cloud); font-weight:600;}
  .body .bline{display:block; white-space:nowrap;}
  .foot{display:flex; align-items:center; gap:24px;}
  .cta{display:inline-flex; align-items:center; background:var(--citron); color:var(--ink);
    font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:34px; padding:24px 40px; border-radius:24px;}
  .handle{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:30px; color:var(--cool-gray);}
</style>
</head>
<body>
  <div class="frame">
    <img class="logo" src="voler-logo-white.png" alt="Voler.ai" />
    <div class="grow"></div>
    <div class="kicker"><span class="dot"></span>{{KICKER}}</div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="body">{{BODY}}</p>
    <div class="grow"></div>
    <div class="foot">{{CTA_BLOCK}}<span class="handle">voler.ai</span></div>
  </div>
  <script>
  (function(){
    function fit(sel,start,min){
      var el=document.querySelector(sel); if(!el) return;
      el.style.fontSize=start+'px';
      var max=el.clientWidth, size=start;
      function over(){var c=el.children;for(var i=0;i<c.length;i++){if(c[i].scrollWidth>max+1)return true;}return false;}
      while(size>min && over()){size-=1; el.style.fontSize=size+'px';}
    }
    function run(){ fit('.headline',104,52); fit('.body',42,24); }
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(run);}
    window.addEventListener('load',run); run();
  })();
  </script>
</body>
</html>
