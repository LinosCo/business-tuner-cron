<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* === Voler.ai brand — variante chiara (cloud) === */
  :root{
    --ink:#10121B; --cloud:#F4F6F8; --rotta:#FF6BB1; --rotta-dark:#A4145F; --cool-gray:#5F6672;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1350px;}
  body{
    background:var(--cloud); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; position:relative; overflow:hidden;
  }
  .frame{position:absolute; inset:0; padding:96px 92px; display:flex; flex-direction:column;}
  .top{display:flex; align-items:center; justify-content:space-between;}
  .logo{height:46px;}
  .index{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:24px; color:var(--cool-gray); letter-spacing:.06em;}
  .kicker{margin-top:84px; display:inline-flex; align-self:flex-start; align-items:center; gap:14px;
    font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:24px;
    text-transform:uppercase; letter-spacing:.16em; color:var(--rotta-dark);}
  .kicker .dot{width:12px; height:12px; border-radius:50%; background:var(--rotta-dark);}
  .headline{margin-top:40px; font-family:"Space Grotesk",system-ui,sans-serif; font-weight:700;
    letter-spacing:-0.02em; line-height:1.06; font-size:96px; color:var(--ink);}
  /* su chiaro l'highlight è un blocco rotta dietro il testo */
  .headline .hl{background:var(--rotta-dark); color:var(--cloud); padding:0 .12em; border-radius:6px; box-decoration-break:clone; -webkit-box-decoration-break:clone;}
  .body{margin-top:40px; font-size:38px; line-height:1.4; color:#3A3F4B; max-width:850px;}
  .body strong{color:var(--ink); font-weight:600;}
  .spacer{flex:1;}
  .foot{display:flex; align-items:center; justify-content:space-between; border-top:2px solid rgba(16,18,27,.12); padding-top:40px;}
  .cta{display:inline-flex; align-items:center; gap:16px; background:var(--ink); color:var(--cloud);
    font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:32px; padding:22px 38px; border-radius:22px;}
  .handle{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:28px; color:var(--cool-gray);}
  /* ogni riga logica (\n) = una riga visiva: niente a capo automatici dentro l'unità di senso */
  .headline .hline{display:block; white-space:nowrap;}
  .body .bline{display:block; white-space:nowrap;}
</style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <img class="logo" src="voler-logo-dark.png" alt="Voler.ai" />
      <div class="index">{{INDEX}}</div>
    </div>
    <div class="kicker"><span class="dot"></span>{{KICKER}}</div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="body">{{BODY}}</p>
    <div class="spacer"></div>
    <div class="foot">
      {{CTA_BLOCK}}
      <span class="handle">voler.ai</span>
    </div>
  </div>
  <script>
  (function(){
    function fit(sel,start,min){
      var el=document.querySelector(sel); if(!el) return;
      el.style.fontSize=start+'px';
      var max=el.clientWidth, size=start;
      function over(){var c=el.children;for(var i=0;i<c.length;i++){if(c[i].scrollWidth>max+1)return true;}return false;}
      while(size>min && over()){size-=1; el.style.fontSize=size+'px';}
    }
    function run(){ fit('.headline',96,46); fit('.body',38,22); }
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(run);}
    window.addEventListener('load',run);
    run();
  })();
  </script>
</body>
</html>
