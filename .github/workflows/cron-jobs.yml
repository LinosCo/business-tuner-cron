      - st-signals-reclassify-pending
      - st-detect-gaps
      - st-sync-insights
      - st-cms-generate-suggestions
      - st-serp-monitoring
      - st-market-themes
      - st-kb-growth
      - st-reset-monthly-counters
      - st-partner-fees
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    env:
      SLACK_CRON_WEBHOOK: ${{ secrets.SLACK_CRON_WEBHOOK }}
    steps:
      - name: Notify Slack
        run: |
          if [ -z "${SLACK_CRON_WEBHOOK}" ]; then
            echo "SLACK_CRON_WEBHOOK is not configured — skipping notification."
            exit 0
          fi
          curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"Cron failure in ${GITHUB_REPOSITORY} (run ${GITHUB_RUN_ID}). See https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${SLACK_CRON_WEBHOOK}"
