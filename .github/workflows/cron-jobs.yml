# =============================================================================
# Cron Jobs Scheduler — Voler Suite Monorepo
# =============================================================================
#
# Ported from ai-interviewer/.github/workflows/cron-jobs.yml (the pattern that
# was running in production on Railway Hobby). Extended to cover every
# `/api/cron/**` route across the four apps in this monorepo: BT, ST, CT, ET.
#
# Required GitHub Secrets (see .github/workflows/README.md):
#   - CRON_SECRET       Bearer token, must match each app's CRON_SECRET env var
#   - BT_DEPLOY_URL     https://… base URL of business-tuner deploy
#   - ST_DEPLOY_URL     https://… base URL of strategy-tuner deploy
#   - CT_DEPLOY_URL     https://… base URL of content-tuner deploy
#   - ET_DEPLOY_URL     https://… base URL of experience-tuner deploy
#   - SLACK_CRON_WEBHOOK (optional) Slack incoming webhook for failure alerts
#
# All times are UTC. Defensive design:
#   - `nick-fields/retry@v3` retries each curl 3× with exponential backoff
#   - `concurrency: cron-<job>` prevents overlapping runs of the same job
#   - On failure a Slack notification fires (if SLACK_CRON_WEBHOOK is set)
#
# GH Actions cron has a ~5-15 min jitter — schedule with that in mind.
#
# Kill-switch: st-cron-preflight fetches /api/cron/pause-status and exposes
# `all` + `paused[]`. Each SCHEDULED ST job is tagged with a category
# (signals | market | tips | billing | maintenance) and self-skips when its
# category — or "all" — is paused. Manual workflow_dispatch runs ALWAYS run.
# A new scheduled job MUST be tagged in its `if` or it runs unconditionally.
# =============================================================================

name: Cron Jobs

on:
  schedule:
    # ── High-Frequency Jobs ──────────────────────────────────────────────
    - cron: '*/10 * * * *' # Every 10 min — signal classification retry
    - cron: '*/15 * * * *' # Every 15 min — dispatch scheduled (ST + CT)
    - cron: '0 */2 * * *'  # Every 2h — signal ingestion proactive
    - cron: '0 */6 * * *'  # Every 6h — signal ingestion full + ET visit ingest

    # ── Daily Jobs ────────────────────────────────────────────────────────
    - cron: '0 0 * * *'    # 00:00 UTC — reset credits
    - cron: '30 0 * * *'   # 00:30 UTC — idempotency cleanup
    - cron: '0 1 * * *'    # 01:00 UTC — audit log cleanup
    - cron: '0 2 * * *'    # 02:00 UTC — aggregate chatbot analytics
    - cron: '30 2 * * *'   # 02:30 UTC — backup DB
    - cron: '0 3 * * *'    # 03:00 UTC — CMS sync analytics
    - cron: '30 3 * * *'   # 03:30 UTC — run-all (tip lifecycle + breach + performance)
    - cron: '0 4 * * *'    # 04:00 UTC — performance snapshot + check alerts
    - cron: '30 4 * * *'   # 04:30 UTC — interview quality alerts
    - cron: '0 5 * * *'    # 05:00 UTC — signal ingestion trends
    - cron: '0 6 * * *'    # 06:00 UTC — tip verify
    - cron: '30 6 * * *'   # 06:30 UTC — gap-to-content
    - cron: '0 7 * * *'    # 07:00 UTC — signal cleanup
    - cron: '0 8 * * *'    # 08:00 UTC — tip retry failed
    - cron: '30 8 * * *'   # 08:30 UTC — oauth token refresh
    - cron: '0 9 * * *'    # 09:00 UTC — breach deadline alerts (separate from run-all)
    - cron: '0 10 * * *'   # 10:00 UTC — performance backfill
    - cron: '0 11 * * *'   # 11:00 UTC — signals/reclassify-pending

    # ── Every 3 days ──────────────────────────────────────────────────────
    - cron: '0 12 */3 * *' # Every 3 days 12:00 UTC — market themes + positioning

    # ── Weekly Jobs (Sunday) ──────────────────────────────────────────────
    - cron: '0 4 * * 0'    # Sunday 04:00 — detect gaps

    # ── Weekly Jobs (Monday) ──────────────────────────────────────────────
    - cron: '0 4 * * 1'    # Monday 04:00 — sync insights
    # NB: cms-generate-suggestions (was Monday 06:00) RETIRED — it generated
    # legacy CMSSuggestion rows whose review UI was removed; the canonical
    # suggestion stream is ProjectTip (CrossChannelInsight→tip). Manual
    # workflow_dispatch still available.
    - cron: '0 8 * * 1'    # Monday 08:00 — serp monitoring
    - cron: '0 10 * * 1'   # Monday 10:00 — kb-growth

    # ── Monthly Jobs (1st of month) ───────────────────────────────────────
    - cron: '30 0 1 * *'   # 1st 00:30 — reset monthly counters
    - cron: '0 1 1 * *'    # 1st 01:00 — partner fees

  workflow_dispatch:
    inputs:
      job:
        description: 'Which cron job to run manually'
        required: true
        type: choice
        options:
          - all
          # ST jobs
          - st-dispatch-scheduled
          - st-signal-classify-retry
          - st-signal-ingestion-fast
          - st-signal-ingestion-full
          - st-signal-ingestion-trends
          - st-signal-ingestion-proactive
          - st-signal-cleanup
          - st-signals-reclassify-pending
          - st-reset-credits
          - st-reset-monthly-counters
          - st-aggregate-chatbot-analytics
          - st-backup-db
          - st-audit-log-cleanup
          - st-idempotency-cleanup
          - st-cms-sync-analytics
          - st-cms-generate-suggestions
          - st-check-alerts
          - st-detect-gaps
          - st-gap-to-content
          - st-sync-insights
          - st-serp-monitoring
          - st-market-themes
          - st-kb-growth
          - st-tip-verify
          - st-tip-lifecycle
          - st-tip-performance
          - st-tip-retry-failed
          - st-performance-snapshot
          - st-performance-backfill
          - st-oauth-token-refresh
          - st-breach-deadline-alerts
          - st-partner-fees
          - st-interview-quality-alerts
          - st-ingest-et-visits
          - st-run-all
          # BT jobs
          - bt-expire-trials
          # CT jobs
          - ct-dispatch-scheduled

env:
  CURL_OPTS: '--fail --silent --show-error --max-time 300'

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Preflight — reads the admin cron-pause state once per run (fail-open).
  # Every scheduled ST job gates on its outputs.
  # ═══════════════════════════════════════════════════════════════════════
  st-cron-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      all: ${{ steps.fetch.outputs.all }}
      paused: ${{ steps.fetch.outputs.paused }}
    steps:
      - name: Fetch cron pause state
        id: fetch
        shell: bash
        run: |
          resp=$(curl --fail --silent --show-error --max-time 20 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.ST_DEPLOY_URL }}/api/cron/pause-status" || echo '')
          if [ -z "$resp" ]; then
            echo "::warning::pause-status unreachable — fail-open (nothing paused)"
            echo "all=false" >> "$GITHUB_OUTPUT"
            echo "paused=[]" >> "$GITHUB_OUTPUT"
          else
            echo "all=$(echo "$resp" | jq -r '.all')" >> "$GITHUB_OUTPUT"
            echo "paused=$(echo "$resp" | jq -c '.categories')" >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # Strategy Tuner — every 15min: dispatch scheduled ProjectTipItems
  # ═══════════════════════════════════════════════════════════════════════
  st-dispatch-scheduled:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-dispatch-scheduled' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '*/15 * * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'tips'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cron-st-dispatch-scheduled
      cancel-in-progress: false
    steps:
      - name: Dispatch Scheduled (ST)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/dispatch-scheduled"

  # ═══════════════════════════════════════════════════════════════════════
  # Content Tuner — every 15min: dispatch ContentDrafts to connectors
  # ═══════════════════════════════════════════════════════════════════════
  ct-dispatch-scheduled:
    if: >-
      github.event.schedule == '*/15 * * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'ct-dispatch-scheduled' || github.event.inputs.job == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cron-ct-dispatch-scheduled
      cancel-in-progress: false
    steps:
      - name: Dispatch Scheduled (CT)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.CT_DEPLOY_URL }}/api/cron/dispatch-scheduled"

  # ═══════════════════════════════════════════════════════════════════════
  # Every 10 min — signal classification retry
  # ═══════════════════════════════════════════════════════════════════════
  st-signal-classify-retry:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-signal-classify-retry' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '*/10 * * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'signals'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cron-st-signal-classify-retry
      cancel-in-progress: false
    steps:
      - name: Signal Classify Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/signal-classify-retry"

  # ═══════════════════════════════════════════════════════════════════════
  # Every 2h — signal ingestion proactive auto-publish
  # ═══════════════════════════════════════════════════════════════════════
  st-signal-ingestion-proactive:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-signal-ingestion-proactive' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 */2 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'signals'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: cron-st-signal-ingestion-proactive
      cancel-in-progress: false
    steps:
      - name: Signal Ingestion Proactive
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 14
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/signal-ingestion?mode=proactive"

  # ═══════════════════════════════════════════════════════════════════════
  # Every 6h — signal ingestion FULL + ET visit ingest
  # ═══════════════════════════════════════════════════════════════════════
  st-signal-ingestion-full:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-signal-ingestion-full' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 */6 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'signals'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: cron-st-signal-ingestion-full
      cancel-in-progress: false
    steps:
      - name: Signal Ingestion Full
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 14
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/signal-ingestion?mode=full"

  st-ingest-et-visits:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-ingest-et-visits' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 */6 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cron-st-ingest-et-visits
      cancel-in-progress: false
    steps:
      - name: ET → ST visit ingestion
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/ingest-et-visits"

  # ═══════════════════════════════════════════════════════════════════════
  # Daily jobs
  # ═══════════════════════════════════════════════════════════════════════
  st-reset-credits:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-reset-credits' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 0 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'billing'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: { group: cron-st-reset-credits, cancel-in-progress: false }
    steps:
      - name: Reset Credits
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/reset-credits"


  bt-expire-trials:
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'bt-expire-trials' || github.event.inputs.job == 'all'))
      || github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: { group: cron-bt-expire-trials, cancel-in-progress: false }
    steps:
      - name: Expire Trials (BT — billing V2)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} -X POST               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"               -H "Content-Type: application/json"               "${{ secrets.BT_DEPLOY_URL }}/api/cron/expire-trials"

  st-idempotency-cleanup:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-idempotency-cleanup' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '30 0 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: { group: cron-st-idempotency-cleanup, cancel-in-progress: false }
    steps:
      - name: Idempotency Cleanup
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/idempotency-cleanup"

  st-audit-log-cleanup:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-audit-log-cleanup' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 1 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: { group: cron-st-audit-log-cleanup, cancel-in-progress: false }
    steps:
      - name: Audit Log Cleanup
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 4
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            curl ${CURL_OPTS} -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/audit-log-cleanup"

  st-aggregate-chatbot-analytics:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-aggregate-chatbot-analytics' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 2 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: { group: cron-st-aggregate-chatbot-analytics, cancel-in-progress: false }
    steps:
      - name: Aggregate Chatbot Analytics
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 9
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/aggregate-chatbot-analytics"

  st-backup-db:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-backup-db' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '30 2 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: { group: cron-st-backup-db, cancel-in-progress: false }
    steps:
      - name: Database Backup
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 14
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            curl ${CURL_OPTS} -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/backup-db"

  st-cms-sync-analytics:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-cms-sync-analytics' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 3 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: { group: cron-st-cms-sync-analytics, cancel-in-progress: false }
    steps:
      - name: CMS Sync Analytics
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 14
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/cms-sync-analytics"

  st-run-all:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-run-all' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '30 3 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'tips'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency: { group: cron-st-run-all, cancel-in-progress: false }
    steps:
      - name: Run-all (lifecycle + breach + performance)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 28
          max_attempts: 2
          retry_wait_seconds: 60
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/run-all"

  st-performance-snapshot:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-performance-snapshot' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 4 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: { group: cron-st-performance-snapshot, cancel-in-progress: false }
    steps:
      - name: Performance Snapshot
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 9
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/performance-snapshot"

  st-check-alerts:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-check-alerts' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '0 4 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: { group: cron-st-check-alerts, cancel-in-progress: false }
    steps:
      - name: Check Alerts
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 9
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.ST_DEPLOY_URL }}/api/cron/check-alerts"

  st-interview-quality-alerts:
    needs: st-cron-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'st-interview-quality-alerts' || github.event.inputs.job == 'all'))
      || (github.event.schedule == '30 4 * * *'
          && needs.st-cron-preflight.outputs.all != 'true'
          && !contains(fromJson(needs.st-cron-preflight.outputs.paused), 'maintenance'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: { group: cron-st-interview-quality-alerts, cancel-in-progress: false }
    steps:
      - name: Interview Quality Alerts
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 9
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            curl ${CURL_OPTS} \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
